steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/emoji-repo/hybrid-sentiment-analysis:latest', 
      '.'
    ]

  # 2. Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push', 
      'us-central1-docker.pkg.dev/$PROJECT_ID/emoji-repo/hybrid-sentiment-analysis:latest'
    ]

  # 3. Deploy to Cloud Run with Safety Constraints
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'emoji-sentiment-app'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/emoji-repo/hybrid-sentiment-analysis:latest'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      # SAFETY CONSTRAINTS:
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '1'
      - '--concurrency'
      - '80'

options:
  logging: CLOUD_LOGGING_ONLY
<!-- templates/components/cta/cta.html -->

<!--
Call-to-Action — Inference Re-Entry Panel

Narrative position:
- Appears after full pipeline, data, model, and under the hood exposition.
- Transition from theory → live experimentation.

Design direction:
- Terminal / signal dispatch aesthetic — matches the monospace technical
  language of the rest of the page.
- Scanline overlay adds texture without competing with content.
- Verified metrics only — no filler, no approximations.
- Primary action is a scroll anchor back to the inference form.
-->

<div class="relative overflow-hidden bg-slate-950 rounded-[2.5rem] border border-slate-800 shadow-2xl">

    <!-- Scanline texture overlay -->
    <div class="absolute inset-0 pointer-events-none opacity-[0.03]"
         style="background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, #fff 2px, #fff 3px);">
    </div>

    <!-- Top terminal bar -->
    <div class="relative px-8 py-4 border-b border-slate-800 flex items-center justify-between">
        <div class="flex items-center gap-2.5">
            <span class="w-1.5 h-1.5 rounded-full bg-rose-500"></span>
            <span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span>
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
            <span class="ml-3 font-mono text-[10px] text-slate-600 uppercase tracking-widest">inference_ready</span>
        </div>
        <span class="font-mono text-[10px] text-emerald-500 animate-pulse">● LIVE</span>
    </div>

    <!-- Main content -->
    <div class="relative px-8 sm:px-16 py-16 sm:py-20 flex flex-col items-center text-center space-y-10">

        <!-- Prompt line -->
        <div class="flex items-center gap-3 font-mono text-[11px] text-slate-500">
            <span class="text-emerald-500">▶</span>
            <span>pipeline.complete() → awaiting_input</span>
            <span class="w-2 h-4 bg-slate-500 animate-pulse inline-block"></span>
        </div>

        <!-- Headline -->
        <div class="space-y-4 max-w-2xl">
            <h2 class="font-mono text-3xl sm:text-4xl font-black text-white leading-tight tracking-tight">
                You've seen the math.<br/>
                <span class="text-blue-400">Now run the inference.</span>
            </h2>
            <p class="font-mono text-[12px] text-slate-400 leading-relaxed">
                Every coefficient, every veto condition, every polarity count —
                all of it executes in under 15ms on your next input.
            </p>
        </div>

        <!-- CTA button -->
        <a href="#live-tool"
           class="group relative inline-flex items-center gap-4
                  bg-blue-600 hover:bg-blue-500
                  text-white font-mono font-black
                  px-10 py-5 rounded-2xl
                  transition-all duration-200
                  hover:scale-[1.02] active:scale-[0.98]
                  shadow-lg shadow-blue-900/40">
            <span class="text-[11px] uppercase tracking-[0.2em]">Execute Classification</span>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                 stroke-width="2.5" stroke="currentColor"
                 class="w-4 h-4 group-hover:-translate-y-0.5 transition-transform">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5 12 3m0 0 7.5 7.5M12 3v18" />
            </svg>
        </a>

</div>
